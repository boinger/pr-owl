name: Bug Report
description: Report a bug in pr-owl
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `pr-owl audit --json`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error output.
    validations:
      required: true
  - type: input
    id: pr-owl-version
    attributes:
      label: pr-owl version
      description: Output of `pr-owl --version`
      placeholder: "0.1.0"
  - type: input
    id: gh-version
    attributes:
      label: gh CLI version
      description: Output of `gh --version`
      placeholder: "gh version 2.x.x"
